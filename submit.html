<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Recipe - Recipe Hub</title>

    <link rel="stylesheet" href="submit.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <header>

        <div class="nav-container">

            <div class="logo">
                <img src="images/logo.png" alt="Recipe Hub logo" class="logo-img">
                Recipe Hub
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="submit.html">Add Recipe</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>

        </div>

    </header>


    <div class="container submit-container">

        <h2>Add New Recipe</h2>

        <form id="recipeForm">

            <label>Recipe Name *</label>
            <input type="text" id="name" required>

            <label>Category</label>
            <select id="category">
                <option value="sri">Sri Lankan Foods</option>
                <option value="indian">Indian Foods</option>
                <option value="european">European Foods</option>
            </select>

            <label>Ingredients *</label>
            <textarea id="ingredients" rows="3" required></textarea>

            <label>Instructions *</label>
            <textarea id="instructions" rows="3" required></textarea>

            <label>Upload Image</label>
            <input type="file" id="image">

            <button type="submit" class="btn btn-success">Submit Recipe</button>
            <button type="reset" class="btn btn-secondary">Reset</button>

        </form>

    </div>


    <footer>

        <div class="footer-container">

            <div class="footer-section">
                <h4>Recipe Hub</h4>
                <p>Discover and share amazing recipes.</p>
            </div>

            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="submit.html">Add Recipe</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </div>

            <div class="footer-section">
                <h4>Contact</h4>
                <P>Telephone:+94 76 123 4567<br>
                    Email: taste@recipehub.com</p>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 Recipe Hub</p>
        </div>

    </footer>


    <script>

        document.getElementById("recipeForm").addEventListener("submit", function (e) {

            e.preventDefault();

            const name = document.getElementById("name").value;
            const category = document.getElementById("category").value;
            const ingredients = document.getElementById("ingredients").value;
            const instructions = document.getElementById("instructions").value;
            const time = document.getElementById("time").value;

            const newRecipe = {
                name: name,
                category: category,
                ingredients: ingredients,
                instructions: instructions,
                time: time
            };

            let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

            recipes.push(newRecipe);

            localStorage.setItem("recipes", JSON.stringify(recipes));

            alert("Recipe added successfully!");

            document.getElementById("recipeForm").reset();

        });

    </script>

</body>

</html>
